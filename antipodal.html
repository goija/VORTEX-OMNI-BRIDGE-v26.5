<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VORTEX v130.0 // AXIAL INVERSION</title>
    <style>
        :root {
            --sirius: #ff33aa; --leo: #ff9900; --main: #00ffcc; --bg: #ffffff;
            --font: 'Courier New', monospace;
        }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: var(--bg); font-family: var(--font); color: #000; }
        
        .interface {
            position: absolute; bottom: 20px; left: 20px; z-index: 10;
            width: 380px; background: rgba(255, 255, 255, 0.98); border: 2px solid #000;
            padding: 15px; box-shadow: 8px 8px 0px #000;
        }

        .axis-tag { background: #000; color: #fff; padding: 10px; text-align: center; font-weight: bold; margin-bottom: 12px; }
        .data-stream { font-size: 0.75rem; line-height: 1.6; border-top: 1px solid #000; padding-top: 12px; }
        .label-box { display: inline-block; padding: 2px 8px; font-weight: bold; background: #000; color: #fff; margin-bottom: 5px; text-transform: uppercase; }
        
        canvas { display: block; width: 100vw; height: 100vh; }
    </style>
</head>
<body>

    <div class="interface">
        <div class="axis-tag">STATUS: AXIAL INVERSION (S-TOP)</div>
        <div class="data-stream">
            <span class="label-box">Oriëntatie: Zuid-Top / Oost-Links</span><br>
            <b>NEXUS:</b> De Mees 27, Laren<br>
            <b style="color:var(--sirius);">SIRIUS POOL:</b> 288° (Gekanteld)<br>
            <b style="color:var(--main);">PENTAGON VECTOR:</b> Inverted Down-Right<br>
            <hr>
            <i style="font-size:0.65rem;">> De-ionisatie in omgekeerde as-rotatie...<br>> Geometrische resonantie stabiel op 432Hz.</i>
        </div>
    </div>

    <canvas id="vortexCanvas"></canvas>

    <script>
        const canvas = document.getElementById('vortexCanvas');
        const ctx = canvas.getContext('2d');
        let time = 0;
        
        const flippedSiriusAngle = 288 * (Math.PI / 180);
        const activeSenderAngle = 108 * (Math.PI / 180);

        function project4D(x, y, z, w, pitch, yaw) {
            let x4 = x * Math.cos(Math.PI/4) - w * Math.sin(Math.PI/4);
            let w4 = x * Math.sin(Math.PI/4) + w * Math.cos(Math.PI/4);
            let cosY = Math.cos(yaw), sinY = Math.sin(yaw);
            let cosP = Math.cos(pitch), sinP = Math.sin(pitch);
            
            let yA = y * cosP - z * sinP;
            let zA = y * sinP + z * cosP;
            let xA = x4 * cosY - zA * sinY;
            let zB = x4 * sinY + zA * cosY;
            
            let f = 800 / (800 + zB + w4);

            // --- AXIAL INVERSION LOGIC ---
            // 1. Oost-Links: xA spiegelen (-xA)
            // 2. Zuid-Top: yA spiegelen (-yA)
            return { x: -xA * f, y: -yA * f, s: f };
        }

        function animate() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            const cx = canvas.width / 2, cy = canvas.height / 2;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            time += 0.01;

            const size = 180;
            const nodes = [];
            // Pitch en Yaw aangepast voor de nieuwe as-beleving
            const pitch = 0.5;
            const yaw = time * 0.2;

            // 1. Hypercube (Leo-Mapping)
            for (let i = 0; i < 16; i++) {
                let x = (i & 1 ? 1 : -1) * size;
                let y = (i & 2 ? 1 : -1) * size;
                let z = (i & 4 ? 1 : -1) * size;
                let w = (i & 8 ? 1 : -1) * size;
                nodes.push(project4D(x, y, z, w, pitch, yaw));
            }

            // Edges
            ctx.lineWidth = 1; ctx.strokeStyle = "rgba(0,0,0,0.1)";
            nodes.forEach((n1, i) => {
                nodes.forEach((n2, j) => {
                    if ((i ^ j) === 1 || (i ^ j) === 2 || (i ^ j) === 4 || (i ^ j) === 8) {
                        ctx.beginPath(); ctx.moveTo(cx + n1.x, cy + n1.y); ctx.lineTo(cx + n2.x, cy + n2.y); ctx.stroke();
                    }
                });
            });

            // 2. Compas Indicatoren (Inverted)
            ctx.font = "bold 16px Courier New"; ctx.fillStyle = "#000";
            ctx.fillText("ZUID (TOP)", cx - 50, 40);
            ctx.fillText("NOORD (BOTTOM)", cx - 60, canvas.height - 30);
            ctx.fillText("OOST (L)", 30, cy);
            ctx.fillText("WEST (R)", canvas.width - 100, cy);

            // 3. Sirius Inversion Vector (288°)
            // Omdat Y gespiegeld is, draait de visuele hoek om
            ctx.strokeStyle = "var(--sirius)"; ctx.setLineDash([10, 5]);
            ctx.beginPath(); ctx.moveTo(cx, cy);
            ctx.lineTo(cx + Math.cos(flippedSiriusAngle)*-400, cy + Math.sin(flippedSiriusAngle)*-400);
            ctx.stroke();
            ctx.setLineDash([]);

            // 4. 34850 Halo (48 nodes)
            const haloR = Math.sqrt(34850);
            for(let i=0; i<48; i++) {
                let a = i * (Math.PI * 2 / 48);
                let p = project4D(Math.cos(a)*haloR, Math.sin(time+i)*12, Math.sin(a)*haloR, 0, pitch, yaw);
                ctx.fillStyle = "rgba(0, 102, 136, 0.4)";
                ctx.beginPath(); ctx.arc(cx + p.x, cy + p.y, 2 * p.s, 0, Math.PI*2); ctx.fill();
            }

            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
