<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VORTEX v136.0 // LONGITUDINAL FLIP</title>
    <style>
        :root {
            --sirius: #ff33aa; --main: #00ffcc; --bg: #ffffff;
            --font: 'Courier New', monospace;
        }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: var(--bg); font-family: var(--font); color: #000; }
        
        .ui-panel {
            position: absolute; bottom: 20px; right: 20px; z-index: 10;
            width: 320px; background: rgba(255, 255, 255, 0.95); border: 2px solid #000;
            padding: 15px; box-shadow: -8px 8px 0px #000;
        }

        .flip-header { background: #000; color: #fff; padding: 8px; text-align: center; font-weight: bold; text-transform: uppercase; }
        .data-stream { font-size: 0.75rem; line-height: 1.5; border-top: 1px solid #000; padding-top: 10px; margin-top: 10px; }
        .focus-label { font-weight: bold; color: var(--sirius); }
        
        canvas { display: block; width: 100vw; height: 100vh; }
    </style>
</head>
<body>

    <div class="ui-panel">
        <div class="flip-header">FLIP: OOST-WEST 180°</div>
        <div class="data-stream">
            <b>MODUS:</b> Longitudinale Inversie<br>
            <span class="focus-label">Sirius-Vector:</span> Nu Linkerboven (Inverted East)<br>
            <b>NEXUS:</b> De Mees 27, Laren<br>
            <hr>
            <i style="font-size:0.65rem;">> Horizontale as gespiegeld...<br>> Verticale as (S-Top) behouden.</i>
        </div>
    </div>

    <canvas id="vortexCanvas"></canvas>

    <script>
        const canvas = document.getElementById('vortexCanvas');
        const ctx = canvas.getContext('2d');
        let time = 0;
        
        // Sirius Azimuth aangepast voor de nieuwe links-georiënteerde Oost
        const targetAngle = 225 * (Math.PI / 180); // Richting linkerboven

        function project4D(x, y, z, w, pitch, yaw) {
            let x4 = x * Math.cos(Math.PI/4) - w * Math.sin(Math.PI/4);
            let w4 = x * Math.sin(Math.PI/4) + w * Math.cos(Math.PI/4);
            let cosY = Math.cos(yaw), sinY = Math.sin(yaw);
            let cosP = Math.cos(pitch), sinP = Math.sin(pitch);
            
            let yA = y * cosP - z * sinP;
            let zA = y * sinP + z * cosP;
            let xA = x4 * cosY - zA * sinY;
            let zB = x4 * sinY + zA * cosY;
            
            let f = 900 / (900 + zB + w4);

            // --- VORTEX CALIBRATION v136 ---
            // 1. Oost-West 180° draai: xA wordt -xA (West-Rechts / Oost-Links)
            // 2. Zuid-Noord behouden (S-Top): yA blijft -yA (van vorige inversie)
            return { x: -xA * f, y: -yA * f, s: f };
        }

        function animate() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            const cx = canvas.width / 2, cy = canvas.height / 2;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            time += 0.01;

            const size = 180;
            const nodes = [];
            const pitch = 0.5;
            const yaw = time * 0.3;

            // 1. Inverted Tesseract
            for (let i = 0; i < 16; i++) {
                let x = (i & 1 ? 1 : -1) * size;
                let y = (i & 2 ? 1 : -1) * size;
                let z = (i & 4 ? 1 : -1) * size;
                let w = (i & 8 ? 1 : -1) * size;
                nodes.push(project4D(x, y, z, w, pitch, yaw));
            }

            // Edges
            ctx.lineWidth = 1; ctx.strokeStyle = "rgba(0,0,0,0.1)";
            nodes.forEach((n1, i) => {
                nodes.forEach((n2, j) => {
                    if ((i ^ j) === 1 || (i ^ j) === 2 || (i ^ j) === 4 || (i ^ j) === 8) {
                        ctx.beginPath(); ctx.moveTo(cx + n1.x, cy + n1.y); ctx.lineTo(cx + n2.x, cy + n2.y); ctx.stroke();
                    }
                });
            });

            // 2. Sirius-Anker: LINKERBOVENKANT (Door Oost-Flip)
            const sx = Math.cos(targetAngle) * 400; 
            const sy = Math.sin(targetAngle) * 400;

            ctx.strokeStyle = "var(--sirius)"; ctx.lineWidth = 4;
            ctx.beginPath(); ctx.moveTo(cx, cy); ctx.lineTo(cx + sx, cy + sy); ctx.stroke();
            
            ctx.fillStyle = "var(--sirius)"; ctx.beginPath(); ctx.arc(cx + sx, cy + sy, 10, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = "#000"; ctx.font = "bold 12px Courier New";
            ctx.fillText("SIRIUS (TOP-L)", cx + sx + 20, cy + sy + 5);

            // 3. Directional Labels (180° Longitude Flip)
            ctx.font = "bold 16px Courier New"; ctx.fillStyle = "#000";
            ctx.fillText("ZUID (TOP)", cx - 45, 40);
            ctx.fillText("NOORD (BOTTOM)", cx - 60, canvas.height - 30);
            ctx.fillText("OOST (L)", 30, cy);
            ctx.fillText("WEST (R)", canvas.width - 100, cy);

            // 4. Halo (48 nodes)
            const haloR = Math.sqrt(34850);
            for(let i=0; i<48; i++) {
                let a = i * (Math.PI * 2 / 48);
                let p = project4D(Math.cos(a)*haloR, Math.sin(time+i)*12, Math.sin(a)*haloR, 0, pitch, yaw);
                ctx.fillStyle = "rgba(0, 102, 136, 0.4)";
                ctx.beginPath(); ctx.arc(cx + p.x, cy + p.y, 2 * p.s, 0, Math.PI*2); ctx.fill();
            }

            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
