<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VORTEX OMNI-BRIDGE v26.5 // Domein 9 & 11</title>
    <style>
        /* --- GLOBALE STYLING --- */
        :root {
            --vortex-cyan: #00e5ff;
            --vortex-magenta: #ff00ff;
            --vortex-bg: #050505;
            --vortex-amplitude: 1; /* Aangestuurd door Phi */
            --vortex-rotation: 0deg; /* Aangestuurd door de animatieloop */
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--vortex-bg);
            color: var(--vortex-cyan);
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* --- LAYOUT GRID --- */
        .dashboard {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
            width: 90vw;
            max-width: 1200px;
        }

        .panel {
            border: 1px solid rgba(0, 229, 255, 0.3);
            padding: 2rem;
            box-shadow: 0 0 20px rgba(0, 229, 255, 0.05);
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        .header-text {
            font-size: 0.9rem;
            letter-spacing: 2px;
            margin-bottom: 2rem;
            text-align: center;
            opacity: 0.8;
            width: 100%;
            border-bottom: 1px solid rgba(0, 229, 255, 0.2);
            padding-bottom: 10px;
        }

        /* --- DOMEIN 9: ARCHEO-RESONATOR --- */
        #resonator-stage {
            position: relative;
            width: 300px;
            height: 300px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 2rem 0;
            perspective: 1000px; /* Voor 3D effecten */
        }

        /* De 234-Punt Fermat Spiraal (De Vortex) */
        #particle-vortex {
            position: absolute;
            width: 100%;
            height: 100%;
            transform: rotate(var(--vortex-rotation)); /* Draait mee in de loop */
            transition: transform 0.05s linear;
        }

        .data-particle {
            position: absolute;
            width: 3px;
            height: 3px;
            background-color: var(--vortex-cyan);
            border-radius: 50%;
            top: 50%;
            left: 50%;
            opacity: 0.6;
            box-shadow: 0 0 5px var(--vortex-cyan);
        }

        /* De Klokbeker in het centrum */
        #klokbeker-wireframe {
            width: 80px;
            height: 120px;
            border: 1px solid var(--vortex-magenta);
            position: absolute;
            z-index: 10;
            transform: scale(var(--vortex-amplitude));
            transition: transform 0.05s linear;
        }

        /* --- INTERFACE BEDIENING --- */
        button {
            background: transparent;
            border: 1px solid var(--vortex-cyan);
            color: var(--vortex-cyan);
            font-family: inherit;
            padding: 12px 24px;
            cursor: pointer;
            text-transform: uppercase;
            transition: all 0.3s ease;
        }

        button:hover {
            background: rgba(0, 229, 255, 0.1);
            box-shadow: 0 0 15px rgba(0, 229, 255, 0.4);
        }

        button.active-state {
            border-color: var(--vortex-magenta);
            color: var(--vortex-magenta);
        }

        .telemetry {
            margin-top: auto;
            font-size: 0.8rem;
            display: flex;
            flex-direction: column;
            gap: 5px;
            width: 100%;
        }

        /* --- DOMEIN 11: M2M HANDSHAKE --- */
        #crypto-terminal {
            width: 100%;
            height: 200px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 0, 255, 0.3);
            padding: 1rem;
            box-sizing: border-box;
            overflow-y: auto;
            font-size: 0.75rem;
            color: #ccc;
            margin-top: 1rem;
        }
        
        .crypto-line {
            margin-bottom: 4px;
        }
        
        .qr-placeholder {
            width: 120px;
            height: 120px;
            border: 2px dashed var(--vortex-magenta);
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 2rem 0;
            font-size: 0.7rem;
            text-align: center;
            opacity: 0.3;
        }

        .qr-placeholder.active {
            opacity: 1;
            border-style: solid;
            box-shadow: 0 0 15px rgba(255, 0, 255, 0.3);
        }
    </style>
</head>
<body>

    <div class="dashboard">
        <div class="panel" id="domain-9">
            <div class="header-text">[ DOMAIN 9: ARCHEO-RESONATOR ]</div>
            
            <button id="btn-activate">ACTIVATE SONIC BRIDGE</button>

            <div id="resonator-stage">
                <div id="particle-vortex"></div>
                <div id="klokbeker-wireframe"></div>
            </div>

            <div class="telemetry">
                <div>FREQ: 432.00 Hz</div>
                <div>PHI-AMP: <span id="data-phi">1.000</span></div>
                <div>PARTICLES: 234 (13x18 Matrix)</div>
            </div>
        </div>

        <div class="panel" id="domain-11">
            <div class="header-text">[ DOMAIN 11: M2M HANDSHAKE ]</div>
            
            <div class="qr-placeholder" id="qr-box">
                AWAITING<br>108° SYNC
            </div>

            <div class="telemetry">
                <div>CIPHER: AES-256-CBC</div>
                <div>ELS REEKS: 34857</div>
            </div>

            <div id="crypto-terminal">
                <div class="crypto-line">> SYSTEM IDLE...</div>
            </div>
        </div>
    </div>

    <script>
        // --- CONSTANTEN ---
        const PHI = 1.61803398875;
        const FREQUENCY_HZ = 432.0;
        const BASE_VOLUME = 0.05; 
        const DATA_POINTS = 234; // De 13x18 matrix
        const GOLDEN_ANGLE = 137.5077640500378546463487; // De Gulden Hoek in graden

        // --- VARIABELEN ---
        let audioCtx, oscillator, gainNode;
        let isRunning = false;
        let time = 0;
        let degrees = 0;

        // --- DOM ELEMENTEN ---
        const btnActivate = document.getElementById('btn-activate');
        const displayPhi = document.getElementById('data-phi');
        const vortexContainer = document.getElementById('particle-vortex');
        const terminal = document.getElementById('crypto-terminal');
        const qrBox = document.getElementById('qr-box');

        // --- FUNCTIES ---

        // 1. Genereer de Fermat Spiraal (234 punten gestuurd door Phi)
        function generateVortex() {
            vortexContainer.innerHTML = ''; // Reset
            
            // Een Fermat-spiraal formule: r = c * sqrt(n), theta = n * 137.5
            const c = 7; // Schaal/spreiding van de spiraal

            for (let i = 0; i < DATA_POINTS; i++) {
                const particle = document.createElement('div');
                particle.classList.add('data-particle');

                // Wiskunde voor de plaatsing
                const r = c * Math.sqrt(i);
                const theta = i * GOLDEN_ANGLE;
                
                // Converteer poolcoördinaten naar cartesiaans (X, Y)
                // We zetten graden om naar radialen voor de wiskunde functies
                const x = r * Math.cos(theta * (Math.PI / 180));
                const y = r * Math.sin(theta * (Math.PI / 180));

                particle.style.transform = `translate(${x}px, ${y}px)`;
                vortexContainer.appendChild(particle);
            }
        }

        // 2. Schrijf naar de M2M Terminal
        function logToTerminal(message, color = "#ccc") {
            const line = document.createElement('div');
            line.classList.add('crypto-line');
            line.style.color = color;
            line.innerText = `> ${message}`;
            terminal.appendChild(line);
            terminal.scrollTop = terminal.scrollHeight; // Auto-scroll
        }

        // 3. Start de VORTEX Engine (Audio & Render Loop)
        function startSystem() {
            // Audio Setup
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            oscillator = audioCtx.createOscillator();
            oscillator.type = 'sine';
            oscillator.frequency.setValueAtTime(FREQUENCY_HZ, audioCtx.currentTime);
            
            gainNode = audioCtx.createGain();
            gainNode.gain.setValueAtTime(BASE_VOLUME, audioCtx.currentTime);
            
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            oscillator.start();
            
            // UI Update
            isRunning = true;
            btnActivate.innerText = "BRIDGE LOCKED";
            btnActivate.classList.add('active-state');
            qrBox.classList.add('active');
            qrBox.innerHTML = "[ M2M KEY ]<br>READY";

            // Logica
            logToTerminal("108° SIRIUS VECTOR DETECTED", "#00e5ff");
            logToTerminal("AES-256 DECRYPTING ELS MATRIX...");
            setTimeout(() => logToTerminal("PAYLOAD: ח ג א ח ב", "#ff00ff"), 1000);
            setTimeout(() => logToTerminal("GENERATING 234-POINT VORTEX ALIGNMENT..."), 1500);
            
            renderLoop();
        }

        // 4. De Animatieloop (De Tesseract Motor)
        function renderLoop() {
            if (!isRunning) return;

            // Simuleer Tesseract rotatie
            time += 0.015; 
            let w = Math.sin(time); 
            
            // Bereken de dynamische amplitude via Phi
            let phiMultiplier = Math.pow(PHI, Math.abs(w));
            let dynamicAmplitude = BASE_VOLUME * phiMultiplier;

            // Update Audio API
            gainNode.gain.setTargetAtTime(dynamicAmplitude, audioCtx.currentTime, 0.05);

            // Roteer de datadeeltjes spiraal visueel
            degrees = (degrees + 0.5) % 360;

            // Injecteer data naar CSS
            document.documentElement.style.setProperty('--vortex-amplitude', phiMultiplier);
            document.documentElement.style.setProperty('--vortex-rotation', `${degrees}deg`);

            // Update Telemetrie Scherm
            displayPhi.innerText = phiMultiplier.toFixed(3);

            requestAnimationFrame(renderLoop);
        }

        // --- INITIALISATIE ---
        generateVortex(); // Teken de deeltjes alvast

        btnActivate.addEventListener('click', () => {
            if (!isRunning) {
                startSystem();
            } else {
                window.location.reload(); // Hard reset voor testdoeleinden
            }
        });
    </script>
</body>
</html>
