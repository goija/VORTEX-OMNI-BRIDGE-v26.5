<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VORTEX v26.5 // KLOKBEKER 6D NEXUS</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <style>
        :root {
            --bg-color: transparent; --grid-color: #0a1f24; --text-main: #00ffcc;
            --text-accent: #ff9900; --text-muted: #4a7c7c; --border-color: #00ffcc44;
            --color-els: #e67e22; --color-nexus: #ff33aa; --color-path: #00e5ff;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-color); color: var(--text-main); font-family: 'Courier New', monospace; margin: 0; overflow: hidden; height: 100vh; }
        body::after { content: " "; display: block; position: fixed; top: 0; left: 0; bottom: 0; right: 0; background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06)); z-index: 9999; pointer-events: none; background-size: 100% 2px, 3px 100%; }
        .bg-grid { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background-image: linear-gradient(var(--grid-color) 1px, transparent 1px), linear-gradient(90deg, var(--grid-color) 1px, transparent 1px); background-size: 20px 20px; z-index: -1; opacity: 0.6; }
        .layout-wrapper { display: flex; flex-direction: column; height: 100vh; width: 100vw; }
        .sidebar { position: fixed; top: 0; left: -100%; width: 360px; height: 100vh; background: rgba(2, 5, 8, 0.98); border-right: 1px solid var(--border-color); padding: 20px; overflow-y: auto; z-index: 1000; transition: left 0.3s; }
        .sidebar.open { left: 0; }
        .main-panel { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 20px; overflow-y: auto; gap: 20px; }
        .visual-wrapper { position: relative; width: 100%; max-width: 600px; aspect-ratio: 1/1; flex-shrink: 0; }
        canvas { background: radial-gradient(circle, #0a1f24 0%, #000 100%); border-radius: 50%; width: 100%; height: 100%; display: block; border: 1px solid var(--border-color); cursor: crosshair; }
        .detail-box { width: 100%; max-width: 600px; border: 1px solid var(--text-muted); padding: 20px; background: rgba(0, 0, 0, 0.85); border-radius: 8px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .data-row { display: flex; justify-content: space-between; font-size: 0.85rem; margin-top: 8px; border-bottom: 1px dashed rgba(0,255,204,0.2); padding-bottom: 4px; }
        .aes-btn { background: rgba(0, 229, 255, 0.1); border: 1px solid var(--text-main); color: var(--text-main); padding: 10px; cursor: pointer; text-align: center; font-weight: bold; width: 100%; margin-top: 10px; border-radius: 4px; text-transform: uppercase; }
        .aes-btn.active { background: var(--text-main); color: #000; }
        .path-indicator { color: var(--color-path); font-weight: bold; text-shadow: 0 0 8px var(--color-path); }
        #tess-tooltip { position: absolute; padding: 8px 12px; background: rgba(0,0,0,0.9); border: 1px solid var(--text-accent); color: #fff; font-size: 0.75rem; pointer-events: none; display: none; z-index: 100; border-radius: 4px; }
        .dir-item { display: grid; grid-template-columns: 35px 80px 1fr; padding: 8px; border-bottom: 1px solid #1a1a1a; cursor: pointer; font-size: 0.8rem; }
        .dir-item.in-path { background: rgba(0, 229, 255, 0.2); border-left: 3px solid var(--color-path); color: #fff; }
        @media (min-width: 1024px) { .layout-wrapper { flex-direction: row; } .sidebar { position: relative; left: 0; width: 380px; } .main-panel { flex-direction: row; align-items: flex-start; justify-content: center; padding: 40px;} }
    </style>
</head>
<body>
    <div class="bg-grid"></div>
    <div class="layout-wrapper">
        <aside class="sidebar" id="mainMenu">
            <h2 style="color:var(--text-main); border-bottom:1px solid;">> OMNI-NEXUS DIRECTORY</h2>
            <div id="module-menu">
                <p style="font-size:0.8rem; color:var(--text-muted);">Selecteer DOMEIN 14 voor 6D Tesseract Navigatie.</p>
                <div class="aes-btn" onclick="loadModule('shl_tesseract')">DOMEIN 14: SHL TESSERACT</div>
            </div>
            <div id="path-stats" style="margin-top:25px; display:none;">
                <h3 style="color:var(--text-accent); font-size:0.9rem;">> HYPERKUBUS NAVIGATIE</h3>
                <div class="data-row"><span>DOEL:</span><span id="target-display">0.0 Hz</span></div>
                <div class="data-row"><span>HUIDIG:</span><span id="current-sum" class="path-indicator">0.0 Hz</span></div>
                <div class="data-row"><span>NODES:</span><span id="node-count">0</span></div>
                <button class="aes-btn" style="border-color:var(--color-nexus); color:var(--color-nexus);" onclick="resetPath()">RESET PAD</button>
            </div>
        </aside>

        <main class="main-panel">
            <div class="visual-wrapper">
                <canvas id="vortexCanvas" width="600" height="600"></canvas>
                <div id="tess-tooltip"></div>
            </div>
            <div class="info-wrapper">
                <div id="detail-content" class="detail-box">
                    <h3 style="color:var(--text-main); margin-top:0;">> SYSTEEM STANDBY</h3>
                    <p style="color:var(--text-muted); line-height:1.6;">Initialiseer module om Hamming-paden te berekenen.</p>
                </div>
            </div>
        </main>
    </div>

    <script>
        const canvas = document.getElementById('vortexCanvas');
        const ctx = canvas.getContext('2d');
        const tooltip = document.getElementById('tess-tooltip');
        
        let tessState = { 
            pitch: 0.3, yaw: 0, zoom: 140, vSpread: 1.5, rSpread: 1.5, 
            autoRot: true, hoverNode: null, isDragging: false, mouse: {x:0, y:0},
            targetFreq: 5832.0, selectedPath: [], currentSum: 0
        };

        const nodeData = [
            {id: 4, bin: "000100", f: 172.8}, {id: 5, bin: "000101", f: 216.0},
            {id: 10, bin: "001010", f: 432.0}, {id: 16, bin: "010000", f: 691.2},
            {id: 17, bin: "010001", f: 734.4}, {id: 20, bin: "010100", f: 864.0},
            {id: 21, bin: "010101", f: 907.2}, {id: 22, bin: "010110", f: 950.4},
            {id: 28, bin: "011100", f: 1209.6}, {id: 34, bin: "100010", f: 1468.8},
            {id: 40, bin: "101000", f: 1728.0}, {id: 52, bin: "110100", f: 2246.4}
        ];

        class QMath {
            constructor(w=1, x=0, y=0, z=0) { this.w=w; this.x=x; this.y=y; this.z=z; }
            rotate(v) {
                let s = this.w, u = {x:this.x, y:this.y, z:this.z};
                let dot = u.x*v.x + u.y*v.y + u.z*v.z;
                let cross = { x: u.y*v.z - u.z*v.y, y: u.z*v.x - u.x*v.z, z: u.x*v.y - u.y*v.x };
                return {
                    x: 2*dot*u.x + (s*s - (u.x*u.x+u.y*u.y+u.z*u.z))*v.x + 2*s*cross.x,
                    y: 2*dot*u.y + (s*s - (u.x*u.x+u.y*u.y+u.z*u.z))*v.y + 2*s*cross.y,
                    z: 2*dot*u.z + (s*s - (u.x*u.x+u.y*u.y+u.z*u.z))*v.z + 2*s*cross.z
                };
            }
        }

        function getHW(n) { let w=0; for(let i=0; i<6; i++) if(n & (1<<i)) w++; return w; }
        function getOrbit(n) { let m=n, c=n; for(let i=0;i<6;i++){ c=((c<<1)|(c>>5))&63; if(c<m) m=c; } return m; }
        
        let nodes = [];
        const tRadii = { 0:0, 63:0, 1:1, 31:1, 3:1.5, 5:0.6, 9:2.0, 15:1.5, 23:0.6, 27:2.2, 7:2.5, 11:1.2, 19:0.5, 21:0 };

        function initTesseract() {
            nodes = []; const orbits = {};
            for(let i=0; i<64; i++) { let o = getOrbit(i); if(!orbits[o]) orbits[o] = []; orbits[o].push(i); }
            for(let i=0; i<64; i++) {
                let hw = getHW(i), o = getOrbit(i), lst = orbits[o]; lst.sort((a,b)=>a-b);
                let ang = (lst.indexOf(i)/lst.length)*Math.PI*2, r = tRadii[o]!==undefined ? tRadii[o] : 1.2;
                nodes.push({id:i, hw:hw, bx:Math.cos(ang)*r, by:(hw-3)*0.8, bz:Math.sin(ang)*r});
            }
        }
        initTesseract();

        function loadModule(id) {
            document.getElementById('path-stats').style.display = 'block';
            document.getElementById('target-display').innerText = tessState.targetFreq.toFixed(1) + " Hz";
            updateUI();
            requestAnimationFrame(render);
        }

        function toggleNode(id) {
            const data = nodeData.find(d => d.id === id);
            if(!data) return;

            const idx = tessState.selectedPath.indexOf(id);
            if(idx > -1) {
                tessState.selectedPath.splice(idx, 1);
            } else {
                if(tessState.selectedPath.length > 0) {
                    const last = tessState.selectedPath[tessState.selectedPath.length - 1];
                    if(getHW(last ^ id) !== 1) {
                        console.warn("Hamming Distance Error: Alleen sprongen van 1 bit toegestaan.");
                        return;
                    }
                }
                tessState.selectedPath.push(id);
            }
            calculateSum();
            updateUI();
        }

        function calculateSum() {
            tessState.currentSum = tessState.selectedPath.reduce((acc, id) => {
                const d = nodeData.find(n => n.id === id);
                return acc + (d ? d.f : 0);
            }, 0);
        }

        function resetPath() { tessState.selectedPath = []; tessState.currentSum = 0; updateUI(); }

        function updateUI() {
            const curEl = document.getElementById('current-sum');
            curEl.innerText = tessState.currentSum.toFixed(1) + " Hz";
            curEl.style.color = (Math.abs(tessState.currentSum - tessState.targetFreq) < 0.1) ? "var(--text-main)" : "var(--color-path)";
            document.getElementById('node-count').innerText = tessState.selectedPath.length;

            let html = `<h3 style="color:var(--text-accent); margin-top:0;">> 6D NEXUS: DOMEIN 14</h3>
                <p style="font-size:0.8rem; color:var(--text-muted);">Navigeer via Hamming-afstand 1. Doel: ${tessState.targetFreq} Hz.</p>
                <div style="max-height:200px; overflow-y:auto; border:1px solid #333;">`;
            
            nodeData.forEach(d => {
                const active = tessState.selectedPath.includes(d.id) ? 'in-path' : '';
                html += `<div class="dir-item ${active}" onclick="toggleNode(${d.id})">
                    <b>${d.id}</b> <span>${d.bin}</span> <span style="text-align:right;">${d.f.toFixed(1)} Hz</span>
                </div>`;
            });
            html += `</div>`;
            document.getElementById('detail-content').innerHTML = html;
        }

        function render() {
            const cw = 600, ch = 600; ctx.clearRect(0, 0, cw, ch);
            if(tessState.autoRot && !tessState.isDragging) tessState.yaw += 0.005;
            
            let cp = Math.cos(tessState.pitch), sp = Math.sin(tessState.pitch);
            let cy = Math.cos(tessState.yaw), sy = Math.sin(tessState.yaw);
            let q = new QMath(cp*cy, -sp*sy, sp*cy, cp*sy); // Vereenvoudigde rotatie-quat

            nodes.forEach(n => {
                let v = q.rotate({x: n.bx*tessState.rSpread, y: n.by*tessState.vSpread, z: n.bz*tessState.rSpread});
                let f = 1000 / (1000 - v.z * 100);
                n.px = 300 + v.x * tessState.zoom * f; n.py = 300 + v.y * tessState.zoom * f; n.pz = v.z; n.s = f;
            });

            // Ribben tekenen
            ctx.lineWidth = 1;
            for(let i=0; i<64; i++) {
                for(let j=i+1; j<64; j++) {
                    if(getHW(i^j) === 1) {
                        let n1 = nodes[i], n2 = nodes[j];
                        if(n1.pz > 9 || n2.pz > 9) continue;
                        const inPath = tessState.selectedPath.includes(i) && tessState.selectedPath.includes(j);
                        ctx.strokeStyle = inPath ? "var(--color-path)" : "rgba(255,255,255,0.05)";
                        ctx.lineWidth = inPath ? 3 : 1;
                        ctx.beginPath(); ctx.moveTo(n1.px, n1.py); ctx.lineTo(n2.px, n2.py); ctx.stroke();
                    }
                }
            }

            // Nodes tekenen
            nodes.forEach(n => {
                if(n.pz > 9) return;
                const isSelected = tessState.selectedPath.includes(n.id);
                const isDataNode = nodeData.some(d => d.id === n.id);
                
                ctx.fillStyle = isSelected ? "var(--color-path)" : (isDataNode ? "var(--text-accent)" : "#333");
                if(isSelected) { ctx.shadowBlur = 15; ctx.shadowColor = "var(--color-path)"; }
                ctx.beginPath(); ctx.arc(n.px, n.py, (isSelected?5:3)*n.s, 0, Math.PI*2); ctx.fill();
                ctx.shadowBlur = 0;
            });

            requestAnimationFrame(render);
        }

        canvas.addEventListener('mousedown', (e) => { tessState.isDragging = true; tessState.mouse = {x: e.clientX, y: e.clientY}; });
        window.addEventListener('mouseup', () => tessState.isDragging = false);
        canvas.addEventListener('mousemove', (e) => {
            if(tessState.isDragging) {
                tessState.yaw += (e.clientX - tessState.mouse.x) * 0.01;
                tessState.pitch += (e.clientY - tessState.mouse.y) * 0.01;
                tessState.mouse = {x: e.clientX, y: e.clientY};
            }
        });

        loadModule();
    </script>
</body>
</html>
