<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VORTEX // KLOKBEKER RESONATOR</title>
    <style>
        :root {
            --bg: #030508;
            --main: #00ffcc;
            --accent: #ff33aa; /* Leo / Shadow color */
            --gold: #f5d400;  /* Sirius color */
            --muted: #1a2a2d;
            --font-mono: 'Courier New', monospace;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background: var(--bg); color: var(--main); font-family: var(--font-mono); 
            overflow: hidden; height: 100vh; display: flex; flex-direction: column;
        }
        header { 
            padding: 15px 25px; border-bottom: 1px solid var(--muted); 
            display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.8);
        }
        .sys-title { font-weight: bold; letter-spacing: 2px; color: var(--gold); }
        
        main { flex: 1; display: grid; grid-template-columns: 350px 1fr; gap: 1px; background: var(--muted); }
        .sidebar { background: var(--bg); padding: 20px; display: flex; flex-direction: column; gap: 20px; }
        .viewport { background: radial-gradient(circle at center, #0a1118 0%, #000 100%); position: relative; cursor: crosshair; }
        
        .panel-label { font-size: 0.75rem; text-transform: uppercase; color: #4a7c7c; border-bottom: 1px dashed #333; padding-bottom: 5px; }
        .data-row { display: flex; justify-content: space-between; font-size: 0.85rem; margin-top: 10px; }
        .val { color: #fff; font-weight: bold; }
        
        canvas { width: 100%; height: 100%; display: block; }
        
        #tracker-overlay {
            position: absolute; top: 20px; right: 20px; width: 180px; height: 180px;
            border-radius: 50%; border: 1px solid rgba(0, 255, 204, 0.2); background: rgba(0,0,0,0.6);
            backdrop-filter: blur(5px); pointer-events: none;
        }

        .btn-active { 
            width: 100%; padding: 12px; background: rgba(0, 255, 204, 0.1); border: 1px solid var(--main);
            color: var(--main); font-family: inherit; font-weight: bold; cursor: pointer; margin-top: 10px;
        }
        .btn-active:active { background: var(--main); color: #000; }

        #terminal { font-size: 0.7rem; color: var(--gold); line-height: 1.5; overflow-y: auto; max-height: 150px; }
    </style>
</head>
<body>

    <header>
        <div class="sys-title">> VORTEX // KLOKBEKER.RESONATOR</div>
        <div id="clock">00:00:00</div>
    </header>

    <main>
        <aside class="sidebar">
            <section>
                <div class="panel-label">Astro Telemetrie</div>
                <div class="data-row"><span>SIRIUS (ANCKOR):</span><span class="val" style="color:var(--gold)">108.0°</span></div>
                <div class="data-row"><span>LEEUW (SHADOW):</span><span class="val" style="color:var(--accent)">150.0°</span></div>
                <div class="data-row"><span>PHASE LOCK:</span><span class="val">ACTIVE</span></div>
            </section>

            <section>
                <div class="panel-label">Resonantie Status</div>
                <div class="data-row"><span>BASE FREQ:</span><span class="val">432.0 Hz</span></div>
                <div class="data-row"><span>WAVE MOD:</span><span class="val">SCHUMANN</span></div>
                <button class="btn-active" onclick="toggleResonance()">INITIATE RESONANCE</button>
            </section>

            <section id="terminal">
                > OMNI-BRIDGE ONLINE...<br>
                > SCANNING AZIMUTH 108...<br>
                > LEO VECTOR DETECTED AT 150...<br>
                > KLOKBEKER MATRIX SYNCED.
            </section>
        </aside>

        <div class="viewport">
            <canvas id="vortexCanvas"></canvas>
            
            <div id="tracker-overlay">
                <canvas id="miniRadar"></canvas>
            </div>
        </div>
    </main>

    <script>
        const canvas = document.getElementById('vortexCanvas');
        const ctx = canvas.getContext('2d');
        const mini = document.getElementById('miniRadar');
        const mctx = mini.getContext('2d');

        let time = 0;
        let isResonating = false;

        function toggleResonance() { 
            isResonating = !isResonating; 
            const term = document.getElementById('terminal');
            term.innerHTML += `<br>> RESONANCE ${isResonating ? 'STABILIZED' : 'DAMPENED'}...`;
            term.scrollTop = term.scrollHeight;
        }

        // --- 3D Projection Helpers ---
        function project(x, y, z) {
            const pitch = 0.5, yaw = time * 0.2;
            let ry = y * Math.cos(pitch) - z * Math.sin(pitch);
            let rz = y * Math.sin(pitch) + z * Math.cos(pitch);
            let rx = x * Math.cos(yaw) - rz * Math.sin(yaw);
            let fz = x * Math.sin(yaw) + rz * Math.cos(yaw);
            let f = 600 / (600 + fz);
            return { x: rx * f, y: ry * f, s: f };
        }

        function drawLeoTracker() {
            const w = 180, h = 180;
            mini.width = w; mini.height = h;
            mctx.clearRect(0,0,w,h);
            const cx = w/2, cy = h/2;

            // Radar rings
            mctx.strokeStyle = 'rgba(0, 255, 204, 0.2)';
            for(let r=20; r<80; r+=20) { mctx.beginPath(); mctx.arc(cx, cy, r, 0, Math.PI*2); mctx.stroke(); }

            // Sirius (108)
            let sAng = (108 - 90) * (Math.PI/180);
            mctx.strokeStyle = 'var(--gold)'; mctx.lineWidth = 2;
            mctx.beginPath(); mctx.moveTo(cx, cy); mctx.lineTo(cx + Math.cos(sAng)*80, cy + Math.sin(sAng)*80); mctx.stroke();
            mctx.fillStyle = 'var(--gold)'; mctx.beginPath(); mctx.arc(cx + Math.cos(sAng)*80, cy + Math.sin(sAng)*80, 4, 0, Math.PI*2); mctx.fill();
            mctx.font = '8px monospace'; mctx.fillText("SIRIUS", cx + Math.cos(sAng)*85, cy + Math.sin(sAng)*85);

            // Leo Shadow (150)
            let lAng = (150 - 90) * (Math.PI/180);
            mctx.strokeStyle = 'var(--accent)';
            mctx.beginPath(); mctx.moveTo(cx, cy); mctx.lineTo(cx + Math.cos(lAng)*80, cy + Math.sin(lAng)*80); mctx.stroke();
            mctx.fillText("LEEUW (150°)", cx + Math.cos(lAng)*40, cy + Math.sin(lAng)*40);
        }

        function render() {
            canvas.width = canvas.parentElement.clientWidth;
            canvas.height = canvas.parentElement.clientHeight;
            const cx = canvas.width / 2, cy = canvas.height / 2;
            time += 0.01;

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // 1. De "Golven" (Schumann Resonantieveld)
            ctx.strokeStyle = 'rgba(0, 255, 204, 0.1)';
            for(let i=-5; i<5; i++) {
                ctx.beginPath();
                for(let x=-400; x<400; x+=10) {
                    let yOffset = Math.sin(x*0.01 + time + i) * 20;
                    let p = project(x, 150 + i*20 + yOffset, 0);
                    if(x===-400) ctx.moveTo(cx + p.x, cy + p.y); else ctx.lineTo(cx + p.x, cy + p.y);
                }
                ctx.stroke();
            }

            // 2. De 150° Schaduw (Leeuw Projectie)
            let shadAng = (150 - 90) * (Math.PI/180);
            ctx.strokeStyle = 'rgba(255, 51, 170, 0.2)';
            ctx.setLineDash([10, 5]);
            let sp1 = project(0, -250, 0);
            let sp2 = project(Math.cos(shadAng)*400, 250, Math.sin(shadAng)*400);
            ctx.beginPath(); ctx.moveTo(cx + sp1.x, cy + sp1.y); ctx.lineTo(cx + sp2.x, cy + sp2.y); ctx.stroke();
            ctx.setLineDash([]);

            // 3. De Klokbeker (3D Object)
            ctx.lineWidth = 1.5;
            for(let a=0; a<Math.PI*2; a+=Math.PI/8) {
                ctx.beginPath();
                ctx.strokeStyle = isResonating ? 'var(--main)' : 'rgba(0, 255, 204, 0.3)';
                for(let y=-150; y<150; y+=10) {
                    // Formule voor de beker-vorm
                    let r = 60 + Math.pow(y/15, 2) * 0.5 - Math.abs(y)*0.2;
                    if(isResonating) r += Math.sin(y*0.1 + time*10) * 3;
                    
                    let p = project(Math.cos(a)*r, y, Math.sin(a)*r);
                    if(y===-150) ctx.moveTo(cx + p.x, cy + p.y); else ctx.lineTo(cx + p.x, cy + p.y);
                }
                ctx.stroke();
            }

            // Horizontale ringen van de beker
            for(let y=-150; y<150; y+=30) {
                ctx.beginPath();
                let r = 60 + Math.pow(y/15, 2) * 0.5 - Math.abs(y)*0.2;
                for(let a=0; a<=Math.PI*2; a+=0.2) {
                    let p = project(Math.cos(a)*r, y, Math.sin(a)*r);
                    if(a===0) ctx.moveTo(cx + p.x, cy + p.y); else ctx.lineTo(cx + p.x, cy + p.y);
                }
                ctx.stroke();
            }

            drawLeoTracker();
            requestAnimationFrame(render);
        }

        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString(); }, 1000);
        render();
    </script>
</body>
</html>
