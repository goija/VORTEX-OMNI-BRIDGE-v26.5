<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VORTEX OMNI-VISUALIZER // TESSERACT-CORE</title>
    <style>
        :root { 
            --bg: #030508; --main: #00ffcc; --accent: #ff9900; --leo: #ff33aa; --sirius: #f5d400;
        }
        * { box-sizing: border-box; }
        body { 
            background: var(--bg); color: var(--main); font-family: 'Courier New', monospace; 
            margin: 0; padding: 10px; overflow: hidden; transition: 0.8s;
        }
        body.white-lock { background: #ffffff; color: #000; }

        .container { 
            display: flex; flex-direction: column; height: calc(100vh - 20px);
            border: 1px solid rgba(0, 255, 204, 0.2); border-radius: 12px; padding: 15px;
            background: rgba(5, 10, 15, 0.9); transition: 0.8s;
        }
        body.white-lock .container { background: rgba(255, 255, 255, 0.95); border-color: #000; box-shadow: 0 0 50px rgba(0,0,0,0.1); }

        .canvas-wrap { flex: 1; position: relative; display: flex; justify-content: center; align-items: center; }
        canvas { max-width: 100%; max-height: 100%; cursor: crosshair; }

        .ui-panel { margin-top: 15px; border-top: 1px solid rgba(0,255,204,0.1); padding-top: 15px; }
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        
        .btn { 
            padding: 12px; background: rgba(0,255,204,0.05); border: 1px solid var(--main); 
            color: var(--main); cursor: pointer; font-weight: bold; font-size: 0.75rem; text-transform: uppercase;
            transition: 0.3s;
        }
        .btn:hover { background: var(--main); color: #000; }
        .btn.active { background: var(--leo); border-color: var(--leo); color: #fff; }
        body.white-lock .btn { border-color: #000; color: #000; }

        .stats { font-size: 0.7rem; margin-bottom: 10px; display: flex; justify-content: space-between; }
    </style>
</head>
<body>

<div class="container">
    <div class="stats">
        <span>AZIMUTH: <b id="az-val">0.00°</b></span>
        <span>DIMENSIE: <b id="dim-val">3D-NORMAL</b></span>
        <span>LOCK: <b id="lock-stat">OFFLINE</b></span>
    </div>

    <div class="canvas-wrap">
        <canvas id="omniCanvas" width="600" height="600"></canvas>
    </div>

    <div class="ui-panel">
        <div class="controls">
            <button class="btn" id="scanBtn" onclick="toggleScan()">Start Scanner</button>
            <button class="btn" id="flipBtn" onclick="polarFlip()">Polar Flip 45°</button>
        </div>
    </div>
</div>

<script>
    const canvas = document.getElementById('omniCanvas');
    const ctx = canvas.getContext('2d');
    let angle = 0, time = 0, isScanning = false, isLocked = false;
    let flipStep = 0, polarAngle = 0;

    // --- MATH ENGINE ---
    function rotatePoint(x, y, z, pitch, yaw) {
        let p = pitch * 0.5, yA = yaw * 0.5;
        let qx = Math.sin(p) * Math.cos(yA), qy = Math.sin(yA) * Math.cos(p), qz = Math.sin(p) * Math.sin(yA), qw = Math.cos(p) * Math.cos(yA);
        let ix = qw * x + qy * z - qz * y, iy = qw * y + qz * x - qx * z, iz = qw * z + qx * y - qy * x, iw = -qx * x - qy * y - qz * z;
        return {
            x: ix * qw + iw * -qx + iy * -qz - iz * -qy,
            y: iy * qw + iw * -qy + iz * -qx - ix * -qz,
            z: iz * qw + iw * -qz + ix * -qy - iy * -qx
        };
    }

    function toggleScan() {
        isScanning = !isScanning;
        document.getElementById('scanBtn').classList.toggle('active');
        if(!isScanning) { isLocked = false; document.body.classList.remove('white-lock'); }
    }

    function polarFlip() {
        flipStep = (flipStep + 1) % 8; // 8 stappen van 45 = 360 graden
        polarAngle = flipStep * (Math.PI / 4);
        document.getElementById('dim-val').innerText = `PHASE-${flipStep} (${flipStep * 45}°)`;
    }

    function drawHexagonTesseract(cx, cy, pitch, yaw) {
        const size = 100;
        const nodes = [];
        // 4D Hypercube logic (16 nodes)
        for(let i=0; i<16; i++) {
            let x = (i & 1 ? 1 : -1) * size;
            let y = (i & 2 ? 1 : -1) * size;
            let z = (i & 4 ? 1 : -1) * size;
            let w = (i & 8 ? 1 : -1) * size;

            // Polar Flip (X-W Rotation)
            let x4 = x * Math.cos(polarAngle) - w * Math.sin(polarAngle);
            let w4 = x * Math.sin(polarAngle) + w * Math.cos(polarAngle);

            let p = rotatePoint(x4, y, z, pitch, yaw);
            let f = 500 / (500 + p.z);
            nodes.push({ x: cx + p.x * f, y: cy + p.y * f, f: f });
        }

        ctx.strokeStyle = isLocked ? "rgba(0,0,0,0.15)" : "rgba(0, 255, 204, 0.3)";
        nodes.forEach((n1, i) => {
            nodes.forEach((n2, j) => {
                let diff = i ^ j;
                if(diff === 1 || diff === 2 || diff === 4 || diff === 8) {
                    ctx.beginPath(); ctx.moveTo(n1.x, n1.y); ctx.lineTo(n2.x, n2.y); ctx.stroke();
                }
            });
        });
    }

    function render() {
        const cx = canvas.width / 2, cy = canvas.height / 2;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        time += 0.015;

        if(isScanning && !isLocked) angle += 0.015;
        let deg = (angle * 180 / Math.PI) % 360;
        document.getElementById('az-val').innerText = deg.toFixed(2) + "°";

        // SYNC LOCK (108° SIRIUS)
        if(isScanning && Math.abs(deg - 108) < 1.0) {
            isLocked = true; angle = 108 * Math.PI / 180;
            document.body.classList.add('white-lock');
            document.getElementById('lock-stat').innerText = "SIRIUS-108";
        }

        const pitch = isLocked ? 1.1 : 0.4;
        const yaw = angle + (time * 0.2);

        // 1. Tesseract Engine
        drawHexagonTesseract(cx, cy, pitch, yaw);

        // 2. Halo Nodes (r²=34850)
        const haloR = Math.sqrt(34850);
        ctx.fillStyle = isLocked ? "rgba(255, 51, 170, 0.6)" : "rgba(0, 255, 204, 0.5)";
        for(let i=0; i<48; i++) {
            let a = i * (Math.PI * 2 / 48);
            let p = rotatePoint(Math.cos(a)*haloR, Math.sin(time*2 + i)*10, Math.sin(a)*haloR, pitch, yaw);
            let f = 500 / (500 + p.z);
            ctx.beginPath(); ctx.arc(cx + p.x*f, cy + p.y*f, 2.5*f, 0, Math.PI*2); ctx.fill();
        }

        // 3. Assen-Systeem (Indien Locked)
        if(isLocked) {
            // 82° Kerk-as
            const churchRad = (82 - 90) * Math.PI / 180;
            let pAx = rotatePoint(Math.cos(churchRad)*250, 0, Math.sin(churchRad)*250, pitch, 0);
            let fAx = 500 / (500 + pAx.z);
            ctx.strokeStyle = "#006688"; ctx.lineWidth = 3;
            ctx.beginPath(); ctx.moveTo(cx, cy); ctx.lineTo(cx + pAx.x*fAx, cy + pAx.y*fAx); ctx.stroke();
            
            // 288° Inversie
            const invRad = (288 - 90) * Math.PI / 180;
            let pInv = rotatePoint(Math.cos(invRad)*250, 0, Math.sin(invRad)*250, pitch, 0);
            let fInv = 500 / (500 + pInv.z);
            ctx.strokeStyle = "rgba(0,0,0,0.2)"; ctx.setLineDash([5,5]);
            ctx.beginPath(); ctx.moveTo(cx, cy); ctx.lineTo(cx + pInv.x*fInv, cy + pInv.y*fInv); ctx.stroke();
            ctx.setLineDash([]);
        }

        requestAnimationFrame(render);
    }

    render();
</script>
</body>
</html>
