<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VORTEX v72 // GROUND STATE (ALEF) ANALYZER</title>
    <style>
        :root { 
            --amber: #ffbf00; --blue: #00d2ff; --bg: #050608; 
            --panel: #0a0c0f; --alef: #00ff66;
        }
        body { 
            background: var(--bg); color: var(--amber); 
            font-family: 'Courier New', monospace; padding: 30px;
            display: flex; flex-direction: column; align-items: center;
        }
        .header { text-align: center; border-bottom: 1px solid #333; padding-bottom: 10px; margin-bottom: 20px; width: 100%; max-width: 800px; }
        .controls { background: var(--panel); border: 1px solid #333; padding: 20px; width: 100%; max-width: 800px; display: flex; gap: 20px; margin-bottom: 20px; }
        .controls input { background: #000; border: 1px solid var(--blue); color: #fff; padding: 10px; font-size: 16px; font-family: inherit; width: 100%; }
        
        table { width: 100%; max-width: 800px; border-collapse: collapse; background: var(--panel); border: 1px solid #222; }
        th, td { border: 1px solid #111; padding: 10px; text-align: center; }
        th { color: var(--blue); background: #111; font-size: 12px; }
        .alef-char { font-size: 24px; color: var(--alef); font-weight: bold; }
        .harmonic { color: #888; font-size: 10px; }
        tr:hover { background: #1a1a1a; }
    </style>
</head>
<body>

    <div class="header">
        <h2 style="letter-spacing: 3px; margin: 0; color: var(--alef);">VORTEX GROUND STATE ANALYZER</h2>
        <div style="font-size: 11px; color: #777;">RESONANCE WAVELENGTHS TO MODULO 0 (ALEF NODES)</div>
    </div>

    <div class="controls">
        <div style="flex:1;">
            <label style="font-size:10px; color:var(--blue); display:block; margin-bottom:5px;">ZOEK BINNEN PERIODE (MAX DAGEN):</label>
            <input type="number" id="maxDays" value="500" min="100">
        </div>
    </div>

    <table id="nodeTable">
        <thead>
            <tr>
                <th>Node #</th>
                <th>Golflengte (Dag/Index)</th>
                <th>Gray Code (G)</th>
                <th>Harmonisch Veelvoud</th>
                <th>Resonantie</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>

    <script>
        const tableBody = document.getElementById('tableBody');
        const maxDaysInput = document.getElementById('maxDays');

        function calculateAlefNodes() {
            tableBody.innerHTML = '';
            const maxDays = parseInt(maxDaysInput.value) || 500;
            let nodeCount = 0;

            // We scannen alle dagen om de chronologische Alef-golflengten te vinden
            for (let b = 0; b <= maxDays; b++) {
                const g = b ^ (b >> 1); // Bereken Gray Code
                
                // Controleer op restwaarde 0 (exact veelvoud van 22)
                if (g % 22 === 0) {
                    nodeCount++;
                    const harmonic = g / 22; // Hoeveelste veelvoud van 22 is dit?

                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td style="color:#555;">[${nodeCount.toString().padStart(3, '0')}]</td>
                        <td style="color:#fff; font-weight:bold; font-size:16px;">${b}</td>
                        <td style="color:var(--amber);">${g}</td>
                        <td class="harmonic">${harmonic} x 22</td>
                        <td class="alef-char">א</td>
                    `;
                    tableBody.appendChild(tr);
                }
            }
        }

        maxDaysInput.addEventListener('input', calculateAlefNodes);
        calculateAlefNodes(); // Initial run
    </script>
</body>
</html>
